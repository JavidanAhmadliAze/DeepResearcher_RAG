name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Unit tests — no external services required
  # -------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: uv run pytest tests/unit -v

  # -------------------------------------------------------------------------
  # Integration tests — spins up a real PostgreSQL service container
  # -------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_research_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d test_research_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpassword@localhost:5432/test_research_db
          AUTH_SECRET_KEY: ci-test-secret-key-32-chars-minimum
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ENABLE_RAG: "false"
        run: uv run pytest tests/integration -v

  # -------------------------------------------------------------------------
  # Deploy to Azure App Service — only on push to main after tests pass.
  # Packages source as a zip and deploys via publish profile (no Docker needed).
  # Required secrets: AZURE_WEBAPP_PUBLISH_PROFILE
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Azure
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      APP_NAME: deep-research-assistant-api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Export requirements.txt
        run: uv export --frozen --no-dev --no-hashes -o requirements.txt

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "tests/*" \
            --exclude "infra/*" \
            --exclude "docs/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".env*" \
            --exclude "*.md" \
            --exclude "docker-compose.yml" \
            --exclude "Dockerfile"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: deep-research-assistant-api-83948394892347382348
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip

  # -------------------------------------------------------------------------
  # Deploy frontend to Azure App Service — only on push to main.
  # Builds Next.js static export, bundles it with `serve` for Node.js hosting.
  # Required secrets: AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE, NEXT_PUBLIC_API_URL
  # -------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FRONTEND_APP_NAME: deep-research-assistant-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build
        working-directory: src/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Prepare deployment package
        run: |
          cp -r src/frontend/out frontend-deploy
          echo '{"dependencies":{"serve":"^14"}}' > frontend-deploy/package.json
          cd frontend-deploy && zip -r ../frontend-deploy.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE }}
          package: frontend-deploy.zip
