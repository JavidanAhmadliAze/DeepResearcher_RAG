version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: research_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-javidan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-research_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-javidan} -d ${DB_NAME:-research_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research_backend
    depends_on:
      db: { condition: service_healthy }
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-javidan}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-research_db}
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  frontend:
    build:
      context: ./src/frontend
      args:
        NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-http://localhost:8000}
    container_name: research_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
